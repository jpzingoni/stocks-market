name: Actualizar datos de mercado

on:
  schedule:
    - cron: '30 20 * * 1-5'  # Lunes a viernes a las 20:30 UTC (17:30 AR)
  workflow_dispatch:          # También permite correrlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr lista_tickers.ipynb
        run: jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=120 lista_tickers.ipynb

      - name: Correr fundamentals_yahoo.ipynb
        run: jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=180 fundamentals_yahoo.ipynb

      - name: Correr valores_p&l.ipynb
        run: jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=180 "valores_p&l.ipynb"

      - name: Correr precios_historicos.ipynb
        run: jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=600 precios_historicos.ipynb

      - name: Guardar CSVs actualizados en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DIM_Tickers.csv fundamentals_yahoo.csv income_statement_yahoo.csv precios_historicos.csv
          git diff --staged --quiet || git commit -m "Actualización automática de datos - $(date +'%Y-%m-%d')"
          git push
